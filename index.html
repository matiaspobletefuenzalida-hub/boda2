<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Boda</title>
    <style>
        /* === ESTILOS GENERALES === */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Times New Roman', serif;
            background-color: #f9f8f3; /* Color crema de respaldo */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* === CONTENEDOR PRINCIPAL CON TU FOTO DE GITHUB === */
        .invitation-container {
            width: 100%;
            height: 100%;
            max-width: 450px; /* Tamaño ideal para celulares */
            /* ¡AQUÍ ESTÁ TU ENLACE! */
            background-image: url('https://raw.githubusercontent.com/matiaspobletefuenzalida-hub/boda2/refs/heads/main/fondo.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* === LA TARJETA CENTRAL CREMA === */
        .card {
            background-color: rgba(253, 252, 248, 0.95); /* Color crema con un poco de transparencia */
            border: 1px solid #d4c4a8;
            padding: 60px 30px;
            width: 75%;
            height: 70%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Doble borde interior (Decoración) */
        .card::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid #d4c4a8;
            pointer-events: none;
        }

        /* Indicadores de página (Líneas superiores) */
        .pagination {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 6px;
        }
        .dot {
            width: 30px;
            height: 1px;
            background-color: #d4c4a8;
        }
        .dot.active {
            background-color: #8c8375;
            height: 2px;
        }

        /* Flechas laterales */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 25px;
            height: 25px;
            background-color: #f5f2eb;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #8c8375;
            cursor: pointer;
            border: 1px solid #d4c4a8;
            font-size: 14px;
        }
        .arrow.left { left: -12px; }
        .arrow.right { right: -12px; }

        /* === TEXTOS === */
        .section {
            margin-bottom: 40px;
        }

        .subtitle {
            font-size: 9px;
            color: #8c8375;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-family: Arial, sans-serif;
        }

        .title {
            font-size: 20px;
            color: #4a4a4a;
            margin: 0 0 12px 0;
            font-weight: normal;
            line-height: 1.3;
        }

        .link {
            font-size: 9px;
            color: #8c8375;
            text-decoration: none;
            letter-spacing: 1.5px;
            border-bottom: 1px solid #8c8375;
            padding-bottom: 2px;
            font-family: Arial, sans-serif;
        }

        .link:hover {
            color: #4a4a4a;
            border-bottom-color: #4a4a4a;
        }
    </style>
</head>
<body>

<div class="invitation-container">
    <div class="card">
        
        <!-- Líneas de arriba -->
        <div class="pagination">
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <!-- Flechas -->
        <div class="arrow left">&lsaquo;</div>
        <div class="arrow right">&rsaquo;</div>

        <!-- Información Ceremonia -->
        <div class="section">
            <div class="subtitle">CEREMONIA - 19:00 H.</div>
            <h2 class="title">Parroquia<br>San Fernando Rey</h2>
            <a href="#" class="link">VER MAPA</a>
        </div>

        <!-- Información Recepción -->
        <div class="section">
            <div class="subtitle">RECEPCIÓN - 21:00 H.</div>
            <h2 class="title">Centro de Eventos<br>"El Quincho"</h2>
            <a href="#" class="link">VER MAPA</a>
        </div>

    </div>
</div>

</body>
</html>
